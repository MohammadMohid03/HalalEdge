<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — HalalEdge</title>
  <style>html { background: #03080f; }</style>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="auth-bg-orb one"></div>
<div class="auth-bg-orb two"></div>

<div class="auth-page">
  <div class="auth-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">☽</div>
      <span>Halal<span class="accent">Edge</span></span>
    </a>

    <div class="auth-card">
      <div class="auth-card-top">
        <h2>Set New Password</h2>
        <p>Enter your new password below</p>
      </div>

      <form class="auth-form" id="resetForm" onsubmit="handleResetPassword(event)">
        <!-- Password -->
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrapper" style="position:relative">
            <i class="fa fa-lock input-icon" style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted)"></i>
            <input type="password" id="newPassword" class="form-input" placeholder="Min. 8 characters" required style="width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--white)" />
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <div class="input-wrapper" style="position:relative">
            <i class="fa fa-lock input-icon" style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted)"></i>
            <input type="password" id="confirmNewPassword" class="form-input" placeholder="Repeat new password" required style="width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--white)" />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="resetBtn" style="margin-top:0.5rem">
          Reset Password
        </button>
      </form>

      <div class="auth-switch" style="margin-top:1.25rem">
        Remembered your password? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  // Extract token from URL query params
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    window.HalalStocks?.showToast('Invalid or missing reset token.', 'error');
    document.getElementById('resetBtn').disabled = true;
  }

  async function handleResetPassword(e) {
    e.preventDefault();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmNewPassword').value;

    if (newPassword.length < 8) {
      window.HalalStocks?.showToast('Password must be at least 8 characters.', 'error');
      return;
    }

    if (newPassword !== confirmPassword) {
      window.HalalStocks?.showToast('Passwords do not match.', 'error');
      return;
    }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting…';

    try {
      const res = await fetch(`${window.HalalStocks.API_BASE}/auth/reset-password?token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(newPassword)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });
      const data = await res.json();
      btn.disabled = false;
      btn.textContent = 'Reset Password';

      if (res.ok) {
        window.HalalStocks?.showToast('Password reset successfully! Redirecting to login...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        window.HalalStocks?.showToast(data.detail || 'Failed to reset password.', 'error');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Reset Password';
      window.HalalStocks?.showToast('Error connecting to backend.', 'error');
    }
  }
</script>
</body>
</html>
